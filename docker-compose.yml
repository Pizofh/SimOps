services:
  db:
    image: postgres:16-alpine
    container_name: simops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-simops}
      POSTGRES_USER: ${POSTGRES_USER:-simops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simops}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-simops} -d ${POSTGRES_DB:-simops}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:

