name: simops

services:
  db:
    image: postgres:16-alpine
    container_name: simops-db
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-simops}
      POSTGRES_USER: ${POSTGRES_USER:-simops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simops}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-simops} -d ${POSTGRES_DB:-simops}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    container_name: simops-backend
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      SIMOPS_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-simops}:${POSTGRES_PASSWORD:-simops}@db:5432/${POSTGRES_DB:-simops}
      SIMOPS_LOG_LEVEL: INFO
      SIMOPS_ENVIRONMENT: docker
      SIMOPS_CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-8080},http://127.0.0.1:${FRONTEND_PORT:-8080},http://localhost:5173,http://127.0.0.1:5173
      SIMOPS_ALLOWED_HOSTS: ${SIMOPS_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,testserver}
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  simulator:
    build:
      context: ./simulator
    container_name: simops-simulator
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      API_URL: http://backend:8000/events
      EVENT_INTERVAL_SECONDS: ${SIMULATOR_INTERVAL_SECONDS:-5}
      FAILURE_RATE: ${SIMULATOR_FAILURE_RATE:-0.25}
      BURST_RATE: ${SIMULATOR_BURST_RATE:-0.15}
      BURST_MIN_SIZE: ${SIMULATOR_BURST_MIN_SIZE:-3}
      BURST_MAX_SIZE: ${SIMULATOR_BURST_MAX_SIZE:-6}
      SERVICE_NAMES: ${SIMULATOR_SERVICE_NAMES:-payments-api,auth-api,inventory-worker}
      ENVIRONMENT: ${SIMULATOR_ENVIRONMENT:-lab}
      SOURCE: simulator
      REQUEST_TIMEOUT_SECONDS: 5
      MAX_RANDOM_DELAY_MS: ${SIMULATOR_MAX_RANDOM_DELAY_MS:-250}
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
    container_name: simops-frontend
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      SIMOPS_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: simops-prometheus
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:latest
    container_name: simops-loki
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./infra/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:latest
    container_name: simops-promtail
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
      backend:
        condition: service_started
      simulator:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: simops-grafana
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  prometheus_data:
  loki_data:
  grafana_data:
